# OpenWave — Elgato Wave XLR (USB ID 0fd9:007d).
#
# UAC1 device: capture and playback share one iso clock. Format/rate
# renegotiation tears down both directions briefly, and is one of the
# triggers for the keepalive-wedge state the daemon recovers from.
# The properties below remove most reasons the device would ever be
# asked to renegotiate at all:
#
#   session.suspend-timeout-seconds = 0  → never auto-suspend on idle
#   node.pause-on-idle = false           → don't pause when no clients
#   audio.rate = 48000                   → publish 48 kHz as the node's
#                                          native rate (apps still resample
#                                          if they want a different rate,
#                                          which is what we want — the
#                                          *device* never changes)
#
# Pairs with wavexlr-audio's data-flow watchdog: even if a wedge slips
# through, the daemon detects it (no bytes for >3s) and recycles the
# pw-cat keepalive.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.usb-Elgato_Systems_Elgato_Wave_XLR.*" }
      { node.name = "~alsa_output.usb-Elgato_Systems_Elgato_Wave_XLR.*" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        node.pause-on-idle = false
        audio.rate = 48000
      }
    }
  }
]
