# Installed by OpenWave — keeps the Elgato Wave XLR's PipeWire nodes from
# being suspended on idle. Without this, WirePlumber suspends idle nodes
# after 5s, fighting the capture-keepalive daemon and triggering format
# renegotiations on the USB device that can glitch concurrent playback.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.usb-Elgato_Systems_Elgato_Wave_XLR.*" }
      { node.name = "~alsa_output.usb-Elgato_Systems_Elgato_Wave_XLR.*" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
